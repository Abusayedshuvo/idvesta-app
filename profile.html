<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idvesta App | Profile</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/profile.css" />
  </head>
  <body>
    <main class="profile">
      <div class="text-center pt-5">
        <p class="text-white fw-semibold fs-5">Profile</p>
        <div class="relative profile-pic">
          <img src="images/01.jpg" alt="" />
          <button><i class="fa-regular fa-camera"></i></button>
        </div>
        <p class="text-white fw-semibold fs-5 mb-2">Name: Seam Rahman</p>
        <p class="text-light2">ID: 123456789</p>
      </div>
      <!-- Account Information -->
      <div class="card-one">
        <p class="text-white fw-semibold fs-6">Account Information</p>
        <ul>
          <li>
            <a href="#">
              <i class="fa-solid fa-user-pen"></i>
              <span> Transaction List</span>
              <i class="fa-solid fa-chevron-right"></i>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa-solid fa-user-pen"></i>
              <span> Deposit List</span>
              <i class="fa-solid fa-chevron-right"></i>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa-solid fa-user-pen"></i>
              <span> Withgrawal List</span>
              <i class="fa-solid fa-chevron-right"></i>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa-solid fa-user-pen"></i>
              <span>Bank Data</span>
              <i class="fa-solid fa-chevron-right"></i>
            </a>
          </li>
        </ul>
      </div>
      <!-- Setting  -->
      <div class="card-one setting-card relative mt-4">
        <p class="text-white fw-semibold fs-6">Setting</p>
        <ul>
          <li>
            <a href="#">
              <i class="fa-regular fa-circle-question"></i>
              <span> Change Password</span>
              <i class="fa-solid fa-chevron-right"></i>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa-regular fa-circle-question"></i>
              <span> About Us</span>
              <i class="fa-solid fa-chevron-right"></i>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa-regular fa-circle-question"></i>
              <span> Faq</span>
              <i class="fa-solid fa-chevron-right"></i>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa-regular fa-circle-question"></i>
              <span> Customer Service</span>
              <i class="fa-solid fa-chevron-right"></i>
            </a>
          </li>
          <li>
            <a href="#">
              <i class="fa-regular fa-circle-question"></i>
              <span> Download Apk</span>
              <i class="fa-solid fa-chevron-right"></i>
            </a>
          </li>
        </ul>
        <div class="middle-shape"></div>
      </div>

      <!-- Log Out -->
      <div class="card-one mt-4">
        <ul>
          <li class="pt-0">
            <a class="log-out" href="#">
              <i class="fa-solid fa-arrow-right-from-bracket"></i>
              <span>Log Out</span>
            </a>
          </li>
        </ul>
        <div class="shape"></div>
      </div>

      <!-- footer start -->
      <footer class="mt-4">
        <a href="#">
          <i class="fa-solid fa-house"></i>
          <span>Home</span>
        </a>
        <a href="#">
          <i class="fa-regular fa-user"></i>
          <span>Team</span>
        </a>
        <a href="#">
          <i class="fa-regular fa-message"></i>
          <span>Task</span>
        </a>
        <a href="#">
          <i class="fa-regular fa-user"></i>
          <span>Profile</span>
        </a>
      </footer>
    </main>
  </body>
</html>
