<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idvesta App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/form.css" />
  </head>
  <body>
    <main class="sign-up change-password">
      <div class="pt-5 text-center">
        <p class="text-white fw-semibold fs-5">Change Password</p>
      </div>
      <form action="#">
        <div class="box text-white border-0 py-0">
          <div class="mt-2 relative">
            <button class="btn-trans show-pass">
              <i class="fa-regular fa-eye-slash"></i>
            </button>
            <label for="">Enter your password</label>
            <input type="password" name="" id="" placeholder="*******" />
          </div>
          <div class="mt-2 relative">
            <button class="btn-trans show-pass">
              <i class="fa-regular fa-eye-slash"></i>
            </button>
            <label for="">Enter your password</label>
            <input type="password" name="" id="" placeholder="*******" />
          </div>
          <p class="mt-1 text-light3 text-14">
            Your password strength: <span class="text-blue">very strong</span>
          </p>
          <div class="mt-2">
            <label class="checkbox">
              <input type="checkbox" />
              <span class="check-box"></span>
              8 characters minimum
            </label>
          </div>
          <div class="mt-1">
            <label class="checkbox">
              <input type="checkbox" />
              <span class="check-box"></span>
              a number
            </label>
          </div>
          <div class="mt-1">
            <label class="checkbox">
              <input type="checkbox" />
              <span class="check-box"></span>
              a symbol
            </label>
          </div>
          <div class="mt-2 relative">
            <button class="btn-trans show-pass">
              <i class="fa-regular fa-eye-slash"></i>
            </button>
            <label for="">Confirm password</label>
            <input type="password" name="" id="" placeholder="*******" />
          </div>
          <div class="relative">
            <div class="middle-shape"></div>
          </div>
          <div class="mt-4 bottom">
            <button class="login-btn">Save Changes</button>
          </div>
        </div>
      </form>
    </main>
  </body>
</html>
