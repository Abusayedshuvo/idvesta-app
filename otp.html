<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idvesta App | OTP</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/form.css" />
  </head>
  <body>
    <main class="sign-up">
      <div class="d-flex align-items-center pt-4">
        <button class="btn-trans">
          <img src="images/btn-back.png" alt="" />
        </button>
        <p class="text-white text-center text-20 fw-semibold w-100 mb-0 pe-5">
          OTP Verification
        </p>
      </div>
      <div class="text-center mt-5">
        <img src="images/icon/ShieldCheck.png" alt="" />
        <div class="mt-4">
          <p class="text-24 fw-semibold text-white">Enter Verification Code</p>
          <p class="text-14 text-light4 mb-0">We’ve sent a 6-digit code to</p>
          <p class="text-light4 fw-medium mb-4">+628 xx-xxxx-xxxx</p>
          <div class="opt-inputs">
            <input type="text" />
            <input type="text" />
            <input type="text" />
            <input type="text" />
            <input type="text" />
            <input type="text" />
          </div>
          <button class="btn-trans text-blue text-18 fw-bold">
            Paste Code
          </button>
        </div>
      </div>

      <form action="#"></form>

      <p class="text-white text-14 text-center mt-4">
        Didn't receive the code?
        <button class="text-blue fs-6 btn-trans" href="#">Resend</button>
      </p>
    </main>
  </body>
</html>
