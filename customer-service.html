<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idvesta App | Customer service</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/depo-list.css" />
  </head>
  <body>
    <main class="deposit-list">
      <div class="d-flex">
        <button></button>
      </div>
      <div class="pt-5 text-center">
        <p class="text-white fw-semibold fs-5">Customer Service</p>
      </div>
      <div class="mt-5">
        <div class="depo-card">
          <div class="d-flex gap-2 align-items-center">
            <span class="bri">BRI</span>
            <div>
              <p class="text-white fw-semibold mb-0">Cs Telegram</p>
              <p class="text-light3 mb-0 text-sm">Live Help service</p>
            </div>
          </div>
          <div class="text-end">
            <a href="#" class="btn-contact">Contact</a>
          </div>
        </div>
        <div class="depo-card">
          <div class="d-flex gap-2 align-items-center">
            <span class="bri">BRI</span>
            <div>
              <p class="text-white fw-semibold mb-0">Information</p>
              <p class="text-light3 mb-0 text-sm">
                Official Updates & Announcements
              </p>
            </div>
          </div>
          <div class="text-end">
            <a href="#" class="btn-contact">Contact</a>
          </div>
        </div>
      </div>
      <div class="mt-5">
        <p class="text-white fw-semibold fs-5">Service Hours</p>
        <div class="row text-center">
          <div class="col-6">
            <div class="depo-card d-block">
              <p class="text-white fs-4 fw-semibold mb-0">10:00-18:00</p>
              <p class="text-light2 mb-0">WIB (GMT+7)</p>
            </div>
          </div>
          <div class="col-6">
            <div class="depo-card d-block">
              <p class="text-white fs-4 fw-semibold mb-0">08:30 WIB</p>
              <p class="text-light2 mb-0">Current Time</p>
            </div>
          </div>
          <div class="col-12">
            <div class="depo-card">
              <div class="d-flex gap-1 text-start">
                <i class="fa-regular fa-circle-question warning mt-1"></i>
                <div class="text-sm">
                  <p class="mb-0 warning">
                    Current outside business hours. Well'l respond when online.
                  </p>
                  <p class="mb-0 text-light3">
                    Please include your User ID when contacting us.
                  </p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
