<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idvesta App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/form.css" />
  </head>
  <body>
    <main class="sign-up">
      <div class="text-center">
        <img class="img-fluid logo" src="images/logo.png" alt="" />
      </div>
      <form action="#">
        <div class="box text-white">
          <p class="fw-semibold mb-1 fs-3">Sign up</p>
          <p class="text-14 fw-medium">
            It only takes a minute to create your account
          </p>
          <div class="mt-2">
            <label for="">Enter your name</label>
            <input type="text" name="" id="" placeholder="Name" />
          </div>
          <div class="mt-2 relative">
            <label for="">Phone number</label>
            <span class="fixed-number">ID +62 |</span>
            <input
              class="number"
              type="text"
              name=""
              id=""
              placeholder="**************"
            />
          </div>

          <div class="mt-2 relative">
            <img src="images/icon/lock.svg" alt="" class="lock" />
            <label for="">Password</label>
            <input type="password" name="" id="" placeholder="*******" />
            <button class="show-pass btn-trans">
              <i class="fa-regular fa-eye-slash"></i>
            </button>
          </div>
          <div class="mt-2">
            <label for="">Security Check</label>
            <div class="row">
              <div class="col-5">
                <div
                  class="security-box d-flex justify-content-between align-items-center"
                >
                  <span class="text-blue">A 8</span>
                  <button class="btn-trans">
                    <img src="images/btn/btn-refresh.svg" alt="" />
                  </button>
                </div>
              </div>
              <div class="col-5">
                <div class="security-box"></div>
              </div>
              <div class="col-1">
                <button class="btn-trans">
                  <img src="images/btn/btn-check.svg" alt="" />
                </button>
              </div>
            </div>
          </div>
          <div class="mt-2 d-flex gap-1 align-items-center">
            <input type="checkbox" name="" id="" />
            <label class="mb-0 ps-1 text-12" for="">
              Accept Terms & Conditions</label
            >
          </div>
          <div class="mt-4">
            <button class="login-btn">Login</button>
          </div>
        </div>
      </form>
      <div class="d-flex gap-3 text-white">
        <hr class="hr-one" />
        <span class="fw-medium">Or Continue With</span>
        <hr class="hr-two" />
      </div>
      <div class="text-center mt-4">
        <img src="images/ojk.png" alt="" />
        <img src="images/brand2.png" alt="" />
      </div>

      <p class="text-white text-14 text-center mt-4">
        Don't have account? <a class="text-blue fs-6" href="#">Login</a>
      </p>
    </main>
  </body>
</html>
