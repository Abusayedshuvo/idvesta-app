<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idvesta App | Bank Data</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/form.css" />
    <link rel="stylesheet" href="css/bank-data.css" />
  </head>
  <body>
    <main class="bank-data">
      <div class="d-flex">
        <button></button>
      </div>
      <div class="pt-5 text-center">
        <p class="text-white fw-semibold fs-5">Bank Data</p>
      </div>
      <div class="mt-5">
        <div class="bank-card">
          <div class="card-head">
            <div class="icon-box">
              <i class="fa-regular fa-circle-user"></i>
            </div>
            <p class="text-white fw-medium mb-0">Current Bank Account</p>
          </div>
          <ul>
            <li>
              <span>Account Holder Name </span>
              <span>Seam Rahaman </span>
            </li>
            <li>
              <span>Account Number </span>
              <span> 369852741</span>
            </li>
            <li>
              <span> Name of the Bank </span>
              <span> OVO </span>
            </li>
          </ul>
        </div>
        <div class="bank-card my-4">
          <div class="card-head">
            <div class="icon-box">
              <i class="fa-regular fa-circle-user"></i>
            </div>
            <p class="text-white fw-medium mb-0">Select & Fill Account Data</p>
          </div>
          <div class="row g-3 mx-2 my-3">
            <div class="col-4">
              <div class="inner-card">
                <img src="images/ovo.png" alt="" />
                <p class="mb-0 text-white fw-medium">OVO</p>
              </div>
            </div>
            <div class="col-4">
              <div class="inner-card">
                <img src="images/ovo.png" alt="" />
                <p class="mb-0 text-white fw-medium">OVO</p>
              </div>
            </div>
            <div class="col-4">
              <div class="inner-card">
                <img src="images/ovo.png" alt="" />
                <p class="mb-0 text-white fw-medium">OVO</p>
              </div>
            </div>
            <div class="col-4">
              <div class="inner-card">
                <img src="images/ovo.png" alt="" />
                <p class="mb-0 text-white fw-medium">OVO</p>
              </div>
            </div>
            <div class="col-4">
              <div class="inner-card">
                <img src="images/ovo.png" alt="" />
                <p class="mb-0 text-white fw-medium">OVO</p>
              </div>
            </div>
            <div class="col-4">
              <div class="inner-card">
                <img src="images/ovo.png" alt="" />
                <p class="mb-0 text-white fw-medium">OVO</p>
              </div>
            </div>
          </div>
        </div>
        <div class="bank-card">
          <ul>
            <li>
              <span>Account Number </span>
              <span> 369852741</span>
            </li>
            <li>
              <span>Owner Name </span>
              <span>Seam Rahaman </span>
            </li>
          </ul>
        </div>
      </div>

      <div class=" ">
        <div class="mt-4 bottom">
          <button class="login-btn">Save Changes</button>
        </div>
      </div>
    </main>
  </body>
</html>
