<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idvesta App | Deposit list</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/depo-list.css" />
  </head>
  <body>
    <main class="deposit-list">
      <div class="d-flex align-items-center pt-5">
        <button class="btn-trans">
          <img src="images/btn-back.png" alt="">
        </button>
        <div class=" text-center w-100">
        <p class="text-white fw-semibold fs-5">Deposit List</p>
      </div>
      </div>
      
      <div class="mt-5">
        <p class="text-white text-14 mb-3">Total Successful Deposit</p>
        <p class="text-white">
          <span>Rp</span>
          <span class="fs-3 fw-semibold">568.990</span>
        </p>

        <ul class="nav nav-tabs" id="myTab" role="tablist">
          <li class="nav-item" role="presentation">
            <button
              class="nav-link active"
              id="home-tab"
              data-bs-toggle="tab"
              data-bs-target="#home-tab-pane"
              type="button"
              role="tab"
              aria-controls="home-tab-pane"
              aria-selected="true"
            >
              All
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button
              class="nav-link"
              id="profile-tab"
              data-bs-toggle="tab"
              data-bs-target="#profile-tab-pane"
              type="button"
              role="tab"
              aria-controls="profile-tab-pane"
              aria-selected="false"
            >
              Success
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button
              class="nav-link"
              id="contact-tab"
              data-bs-toggle="tab"
              data-bs-target="#contact-tab-pane"
              type="button"
              role="tab"
              aria-controls="contact-tab-pane"
              aria-selected="false"
            >
              In Process
            </button>
          </li>
        </ul>
        <div class="tab-content" id="myTabContent">
          <div
            class="tab-pane fade show active"
            id="home-tab-pane"
            role="tabpanel"
            aria-labelledby="home-tab"
            tabindex="0"
          >
            <div class="depo-card">
              <div class="d-flex gap-2 align-items-center">
                <img src="images/bri.png" alt="">
                <div>
                  <p class="text-white fs-5 fw-semibold mb-1">Rp 50.00</p>
                  <p class="text-light3 mb-0">1478529633</p>
                </div>
              </div>
              <div class="text-end">
                <span class="success badge">Success</span>
                <p class="text-light3 text-14 mb-0">29 jan 2026, 10:30</p>
              </div>
            </div>
            <div class="depo-card">
              <div class="d-flex gap-2 align-items-center">
                  <img src="images/bri.png" alt="">
                <div>
                  <p class="text-white fs-5 fw-semibold mb-1">Rp 50.00</p>
                  <p class="text-light3 mb-0">1478529633</p>
                </div>
              </div>
              <div class="text-end">
                <span class="process badge">In Process</span>
                <p class="text-light3 text-14 mb-0">29 jan 2026, 10:30</p>
              </div>
            </div>
          </div>
          <div
            class="tab-pane fade"
            id="profile-tab-pane"
            role="tabpanel"
            aria-labelledby="profile-tab"
            tabindex="0"
          >
            2
          </div>
          <div
            class="tab-pane fade"
            id="contact-tab-pane"
            role="tabpanel"
            aria-labelledby="contact-tab"
            tabindex="0"
          >
            3
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
