<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idvesta App | Referral Details</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"

    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/redeem.css" />
  </head>
  <body>
    <main class="">
      <div class="pt-5 text-center">
        <p class="text-white fw-semibold fs-5">Referral Details</p>
      </div>
      <div class="red-card">
        <p class="text-18 text-white">Level 1</p>
        <div class="bar">
          <div class="active" style="width: 25%"></div>
        </div>
        <div class="row mt-3">
          <div class="col-6">
            <div class="card-two">
              <div class="icon-box"><i class="fa-solid fa-user-group"></i></div>
              <p class="text-18 text-white mb-1 mt-1 fw-semibold">49</p>
              <p class="text-light3 mb-0 text-14">Total Active Ref</p>
            </div>
          </div>
          <div class="col-6">
            <div class="card-two">
              <div class="icon-box"><i class="fa-solid fa-user-group"></i></div>
              <p class="text-18 text-white fw-semibold mb-1 mt-1">
                Rp. 25,223,015
              </p>
              <p class="text-light3 mb-0 text-14">Total Commission</p>
            </div>
          </div>
        </div>
      </div>
      <div class="red-card mt-4">
        <div class="d-flex justify-content-between">
          <div>
            <p class="mb-0 text-white fw-semibold">Ahmed Wardana</p>
            <p class="mb-0 text-light3 text-sm">Total Investment</p>
          </div>
          <div class="text-end">
            <p class="mb-0 active text-sm"><span class="dot"></span> Active</p>
            <p class="mb-0 text-white fw-semibold">Rp. 1,000,000</p>
          </div>
        </div>
      </div>
      <div class="red-card mt-4">
        <div class="d-flex justify-content-between">
          <div>
            <p class="mb-0 text-white fw-semibold">Ahmed Wardana</p>
            <p class="mb-0 text-light3 text-sm">Total Investment</p>
          </div>
          <div class="text-end">
            <p class="mb-0 active text-sm"><span class="dot"></span> Active</p>
            <p class="mb-0 text-white fw-semibold">Rp. 1,000,000</p>
          </div>
        </div>
      </div>
      <div class="red-card mt-4">
        <div class="d-flex justify-content-between">
          <div>
            <p class="mb-0 text-white fw-semibold">Ahmed Wardana</p>
            <p class="mb-0 text-light3 text-sm">Total Investment</p>
          </div>
          <div class="text-end">
            <p class="mb-0 active text-sm"><span class="dot"></span> Active</p>
            <p class="mb-0 text-white fw-semibold">Rp. 1,000,000</p>
          </div>
        </div>
      </div>

      <div class="middle-shape"></div>
    </main>
