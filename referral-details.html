<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idvesta App | Referral Details</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/redeem.css" />
  </head>
  <body>
    <main
      class="referral-details"
      style="background-image: url(images/signup-bg.jpeg)"
    >
      <div class="d-flex align-items-center pt-5 mb-5">
        <button class="btn-trans">
          <img src="images/btn-back.png" alt="" />
        </button>
        <div class="text-center w-100">
          <p class="text-white fw-semibold fs-5 me-5 mb-0">Referral Details</p>
        </div>
      </div>
      <div class="red-card relative">
        <img class="referral-bg" src="images/refer-bg.png" alt="" />
        <div class="d-flex justify-content-between">
          <p class="text-18 text-white">
            <img src="images/icon/referral1.png" alt="" /> Level 1
          </p>
          <p class="green text-14 fw-medium mb-0">Rebate commission (30%)</p>
        </div>

        <div class="card-one">
          <div class="row g-2">
            <div class="col-6">
              <div class="card-two">
                <img class="bg" src="images/referral-bg2.png" alt="" />
                <div>
                  <img src="images/icon/active-ref.svg" alt="" />
                </div>
                <p class="text-18 text-white mb-1 mt-1 fw-semibold">49</p>
                <p class="text-light3 mb-0 text-14">Total Active Ref</p>
              </div>
            </div>
            <div class="col-6">
              <div class="card-two">
                <img class="bg" src="images/referral-bg2.png" alt="" />
                <img src="images/icon/commission.svg" alt="" />
                <p class="text-18 text-white fw-semibold mb-1 mt-1">
                  Rp. 25,223,015
                </p>
                <p class="text-light3 mb-0 text-14">Total Commission</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="red-card mt-4">
        <div class="d-flex justify-content-between text-white">
          <div class="d-flex gap-2 align-items-center">
            <div>
              <img class="user" src="images/01.jpg" alt="" />
            </div>
            <div>
              <p class="mb-0 fw-medium">Budi Santoso</p>
              <p class="mb-0 text-12">+91****************</p>
              <p class="mb-0 text-12">Total Investment</p>
            </div>
          </div>
          <div class="text-end">
            <p class="mb-0 active text-sm mt-2">
              <span class="dot"></span> Active
            </p>
            <p class="mb-0 text-white fw-semibold">Rp. 1,000,000</p>
          </div>
        </div>
        <div class="top">
          <img src="images/icon/01.png" alt="" />
          Top 01
        </div>
        <div class="left-bar"></div>
      </div>
      <div class="red-card mt-4">
        <div class="d-flex justify-content-between text-white">
          <div class="d-flex gap-2 align-items-center">
            <div>
              <img class="user" src="images/01.jpg" alt="" />
            </div>
            <div>
              <p class="mb-0 fw-medium">Budi Santoso</p>
              <p class="mb-0 text-12">+91****************</p>
              <p class="mb-0 text-12">Total Investment</p>
            </div>
          </div>
          <div class="text-end">
            <p class="mb-0 active text-sm mt-2">
              <span class="dot"></span> Active
            </p>
            <p class="mb-0 text-white fw-semibold">Rp. 1,000,000</p>
          </div>
        </div>
        <div class="top">
          <img src="images/icon/01.png" alt="" />
          Top 01
        </div>
        <div class="left-bar"></div>
      </div>
    </main>
  </body>
</html>
