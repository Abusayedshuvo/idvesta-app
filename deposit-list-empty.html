<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idvesta App | Deposit list Empty</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/depo-list.css" />
  </head>
  <body>
    <main
      class="deposit-list"
      style="background-image: url(images/signup-bg.jpeg)"
    >
      <div class="d-flex align-items-center pt-5">
        <button class="btn-trans">
          <img src="images/btn-back.png" alt="" />
        </button>
        <div class="text-center w-100">
          <p class="text-white fw-semibold fs-5 mb-0 me-5">Deposit History</p>
        </div>
      </div>

      <div class="mt-5">
        <p class="text-white text-14 mb-3">Total Successful Deposit</p>
        <p class="text-white">
          <span>Rp</span>
          <span class="fs-3 fw-semibold">0.0</span>
        </p>
      </div>
      <div class="empty">
        <img class="img-fluid" src="images/deposit-empty.png" alt="" />
        <div class="mt-4">
          <p class="text-20 fw-medium">No Deposit History Yet</p>
          <p class="text-14">
            Your deposit records will appear here after you first deposit.
          </p>
          <div class="mt-4">
            <button class="btn-empty">Deposit Now</button>
          </div>
        </div>
      </div>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
