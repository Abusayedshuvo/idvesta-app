<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Idvesta App | Redeem Code</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/redeem.css" />
  </head>
  <body>
    <main class="">
      <div class="pt-5 text-center">
        <p class="text-white fw-semibold fs-5">Redeem Code</p>
      </div>
      <div class="red-card">
        <div class="d-flex gap-2">
          <div class="icon-box"><i class="fa-solid fa-gift"></i></div>
          <p class="title">Redeem Your Code</p>
        </div>
        <p class="mb-0 text-light3 text-14">
          Enter a valid redeem code to receive rewards, bonuses, or special
          prizes.
        </p>
      </div>
      <div class="red-card mt-4">
        <p class="cor text-14">Redeem Your Code</p>
        <input type="text" placeholder="Enter your code" />
        <div class="mt-4">
          <button class="red-btn">Redeem Now</button>
        </div>
        <p class="text-center desc">
          Try WELCOMESO, BONUS100, CRYPTO2526, of INVEST500
        </p>
      </div>
      <div class="relative">
        <div class="middle-shape"></div>
      </div>
    </main>
  </body>
</html>
